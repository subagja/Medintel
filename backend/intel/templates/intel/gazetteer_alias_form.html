{% extends "intel/base.html" %}

{% block content %}
<div class="card">
    <h1>{% if mode == "edit" %}Edit Alias{% else %}Tambah Alias{% endif %}</h1>

    <form method="post">
        {% csrf_token %}

        {% for field in form %}
        <div class="form-row">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <div class="error">{{ field.errors }}</div>
            {% endif %}
        </div>
        {% endfor %}

        <button type="submit">Simpan</button>
        <a href="{% url 'intel:gazetteer_alias_manager' %}">Kembali</a>
    </form>
</div>
{% endblock %}
